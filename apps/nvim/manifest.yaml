name: nvim
description: Neovim configuration and editor bootstrap
platforms:
  - linux
  - wsl
  - macos
install:
  linux:
    github_release: neovim
  macos:
    brew:
      - neovim
link:
  strategy: symlink-tree
checks:
  - command: nvim --version
notes:
  - Bootstrap installs Neovim and links ~/.config/nvim
